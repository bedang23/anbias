<svg width="100%" viewBox="0 0 1200 701.8" xmlns="http://www.w3.org/2000/svg" style="display:block;background:#141414;border-radius:12px;">
  <defs>
    <!-- Grid pattern -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="0.8"/>
    </pattern>
    <!-- Radial mask for grid fade -->
    <radialGradient id="gridMask" cx="35%" cy="55%" r="65%">
      <stop offset="0%" stop-color="white" stop-opacity="1"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <mask id="gm">
      <rect width="1200" height="630" fill="url(#gridMask)"/>
    </mask>
    <!-- Scanline gradient (top to bottom sweep) -->
    <linearGradient id="scanGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C8F135" stop-opacity="0"/>
      <stop offset="48%" stop-color="#C8F135" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#C8F135" stop-opacity="0.18"/>
      <stop offset="52%" stop-color="#C8F135" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#C8F135" stop-opacity="0"/>
    </linearGradient>
    <!-- Subtle lime glow on left -->
    <radialGradient id="limeGlow" cx="0%" cy="80%" r="55%">
      <stop offset="0%" stop-color="#C8F135" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#C8F135" stop-opacity="0"/>
    </radialGradient>
    <!-- Right-side dark vignette -->
    <linearGradient id="vignette" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#141414" stop-opacity="0"/>
      <stop offset="70%" stop-color="#141414" stop-opacity="0"/>
      <stop offset="100%" stop-color="#141414" stop-opacity="0.6"/>
