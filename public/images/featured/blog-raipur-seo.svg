<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Local SEO in Raipur">
  <defs>
    <linearGradient id="bg-seo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1220"/>
      <stop offset="100%" stop-color="#1A1F3A"/>
    </linearGradient>
    <linearGradient id="acc-seo" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <radialGradient id="glow-seo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid-seo" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#1F2937" stroke-width="1" opacity="0.6"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg-seo)"/>
  <rect width="1200" height="630" fill="url(#grid-seo)"/>

  <!-- glow -->
  <circle cx="940" cy="315" r="280" fill="url(#glow-seo)"/>

  <!-- Search results metaphor on right -->
  <g transform="translate(720 175)">
    <!-- search bar -->
    <rect x="0" y="0" width="420" height="48" rx="24" fill="#111827" stroke="#374151" stroke-width="1.5"/>
    <circle cx="28" cy="24" r="9" fill="none" stroke="#06B6D4" stroke-width="2.5"/>
    <line x1="35" y1="31" x2="44" y2="40" stroke="#06B6D4" stroke-width="2.5" stroke-linecap="round"/>
    <text x="60" y="29" font-family="Inter, system-ui, sans-serif"
          font-size="16" font-weight="500" fill="#9CA3AF">
      web developer near me
    </text>
    <rect x="380" y="14" width="2" height="20" fill="#06B6D4">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>

    <!-- result row 1 (top spot - highlighted) -->
    <g transform="translate(0 75)">
      <rect x="0" y="0" width="420" height="60" rx="10" fill="#0F172A" stroke="#06B6D4" stroke-width="1.5"/>
      <rect x="14" y="14" width="32" height="32" rx="6" fill="#06B6D4"/>
      <text x="30" y="35" font-family="Inter, sans-serif" font-size="16" font-weight="800" fill="#0B1220" text-anchor="middle">A</text>
      <rect x="58" y="16" width="180" height="8" rx="4" fill="#E5E7EB"/>
      <rect x="58" y="32" width="240" height="6" rx="3" fill="#6B7280"/>
      <rect x="58" y="44" width="120" height="5" rx="2.5" fill="#4B5563"/>
      <text x="380" y="38" font-family="ui-monospace, monospace" font-size="22" fill="#06B6D4" text-anchor="middle">#1</text>
    </g>

    <!-- result row 2 -->
    <g transform="translate(0 145)" opacity="0.55">
      <rect x="0" y="0" width="420" height="60" rx="10" fill="#0F172A" stroke="#374151" stroke-width="1"/>
      <rect x="14" y="14" width="32" height="32" rx="6" fill="#374151"/>
      <rect x="58" y="16" width="160" height="8" rx="4" fill="#9CA3AF"/>
      <rect x="58" y="32" width="220" height="6" rx="3" fill="#4B5563"/>
      <rect x="58" y="44" width="100" height="5" rx="2.5" fill="#374151"/>
    </g>

    <!-- result row 3 -->
    <g transform="translate(0 215)" opacity="0.4">
      <rect x="0" y="0" width="420" height="60" rx="10" fill="#0F172A" stroke="#374151" stroke-width="1"/>
      <rect x="14" y="14" width="32" height="32" rx="6" fill="#374151"/>
      <rect x="58" y="16" width="170" height="8" rx="4" fill="#9CA3AF"/>
      <rect x="58" y="32" width="200" height="6" rx="3" fill="#4B5563"/>
      <rect x="58" y="44" width="90" height="5" rx="2.5" fill="#374151"/>
    </g>
  </g>

  <!-- Eyebrow -->
  <text x="80" y="120" font-family="Inter, system-ui, sans-serif"
        font-size="18" font-weight="600" fill="#06B6D4" letter-spacing="4">
    LOCAL BUSINESS GROWTH
  </text>

  <!-- Headline -->
  <text x="80" y="200" font-family="Inter, system-ui, sans-serif"
        font-size="68" font-weight="800" fill="#FFFFFF" letter-spacing="-1.5">
    Local SEO
  </text>
  <text x="80" y="265" font-family="Inter, system-ui, sans-serif"
        font-size="58" font-weight="800" fill="#06B6D4" letter-spacing="-1.5">
    in Raipur.
  </text>

  <!-- Sub-headline -->
  <text x="80" y="330" font-family="Inter, system-ui, sans-serif"
        font-size="24" font-weight="400" fill="#9CA3AF">
    How to actually get found on Google —
  </text>
  <text x="80" y="365" font-family="Inter, system-ui, sans-serif"
        font-size="24" font-weight="400" fill="#9CA3AF">
    a guide for Chhattisgarh businesses.
  </text>

  <!-- divider -->
  <rect x="80" y="430" width="64" height="3" fill="url(#acc-seo)"/>

  <!-- Author / brand -->
  <text x="80" y="475" font-family="Inter, system-ui, sans-serif"
        font-size="18" font-weight="600" fill="#E5E7EB">ANBIAS</text>
  <text x="80" y="500" font-family="Inter, system-ui, sans-serif"
        font-size="15" font-weight="400" fill="#6B7280">
    AI-Powered Web Development &amp; Security
  </text>

  <text x="1120" y="595" font-family="ui-monospace, monospace"
        font-size="14" font-weight="500" fill="#4B5563" text-anchor="end">
    anbias.com / blog
  </text>
</svg>
