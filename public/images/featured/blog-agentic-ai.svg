<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Agentic AI and How It Transforms IT">
  <defs>
    <linearGradient id="bg-aai" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1220"/>
      <stop offset="100%" stop-color="#1A1F3A"/>
    </linearGradient>
    <linearGradient id="acc-aai" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <radialGradient id="glow-aai" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid-aai" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#1F2937" stroke-width="1" opacity="0.6"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg-aai)"/>
  <rect width="1200" height="630" fill="url(#grid-aai)"/>

  <!-- glow -->
  <circle cx="950" cy="315" r="280" fill="url(#glow-aai)"/>

  <!-- agent network: central node connected to autonomous agents -->
  <g transform="translate(950 315)">
    <!-- connection lines (animated feel) -->
    <g stroke="url(#acc-aai)" stroke-width="2" fill="none" opacity="0.7">
      <line x1="0" y1="0" x2="-140" y2="-110"/>
      <line x1="0" y1="0" x2="140" y2="-110"/>
      <line x1="0" y1="0" x2="-160" y2="20"/>
      <line x1="0" y1="0" x2="160" y2="20"/>
      <line x1="0" y1="0" x2="-110" y2="140"/>
      <line x1="0" y1="0" x2="110" y2="140"/>
    </g>

    <!-- outer agent nodes (smaller circles with icons) -->
    <g>
      <circle cx="-140" cy="-110" r="32" fill="#0B1220" stroke="url(#acc-aai)" stroke-width="2"/>
      <circle cx="140"  cy="-110" r="32" fill="#0B1220" stroke="url(#acc-aai)" stroke-width="2"/>
      <circle cx="-160" cy="20"   r="32" fill="#0B1220" stroke="url(#acc-aai)" stroke-width="2"/>
      <circle cx="160"  cy="20"   r="32" fill="#0B1220" stroke="url(#acc-aai)" stroke-width="2"/>
      <circle cx="-110" cy="140"  r="32" fill="#0B1220" stroke="url(#acc-aai)" stroke-width="2"/>
      <circle cx="110"  cy="140"  r="32" fill="#0B1220" stroke="url(#acc-aai)" stroke-width="2"/>

      <!-- mini icons inside agents -->
      <text x="-140" y="-103" font-family="ui-monospace, monospace" font-size="22" fill="#10B981" text-anchor="middle">▶</text>
      <text x="140"  y="-103" font-family="ui-monospace, monospace" font-size="22" fill="#06B6D4" text-anchor="middle">⌬</text>
      <text x="-160" y="27"   font-family="ui-monospace, monospace" font-size="22" fill="#10B981" text-anchor="middle">∞</text>
      <text x="160"  y="27"   font-family="ui-monospace, monospace" font-size="22" fill="#06B6D4" text-anchor="middle">↻</text>
      <text x="-110" y="147"  font-family="ui-monospace, monospace" font-size="22" fill="#10B981" text-anchor="middle">⚙</text>
      <text x="110"  y="147"  font-family="ui-monospace, monospace" font-size="22" fill="#06B6D4" text-anchor="middle">✦</text>
    </g>

    <!-- central core -->
    <circle r="60" fill="#0B1220" stroke="url(#acc-aai)" stroke-width="3"/>
    <circle r="46" fill="none" stroke="#10B981" stroke-width="1" opacity="0.4"/>
    <text y="12" font-family="Inter, system-ui, sans-serif"
          font-size="32" font-weight="800" fill="#10B981" text-anchor="middle">AI</text>
  </g>

  <!-- Eyebrow -->
  <text x="80" y="120" font-family="Inter, system-ui, sans-serif"
        font-size="18" font-weight="600" fill="#10B981" letter-spacing="4">
    AI TRANSFORMATION
  </text>

  <!-- Headline -->
  <text x="80" y="200" font-family="Inter, system-ui, sans-serif"
        font-size="68" font-weight="800" fill="#FFFFFF" letter-spacing="-1.5">
    Agentic AI
  </text>
  <text x="80" y="275" font-family="Inter, system-ui, sans-serif"
        font-size="48" font-weight="700" fill="#E5E7EB" letter-spacing="-1">
    From assistants to
  </text>
  <text x="80" y="325" font-family="Inter, system-ui, sans-serif"
        font-size="48" font-weight="700" fill="#10B981" letter-spacing="-1">
    autonomous execution.
  </text>

  <!-- Sub-headline -->
  <text x="80" y="385" font-family="Inter, system-ui, sans-serif"
        font-size="22" font-weight="400" fill="#9CA3AF">
    What changes for engineering, ops, and outcomes.
  </text>

  <!-- divider -->
  <rect x="80" y="430" width="64" height="3" fill="url(#acc-aai)"/>

  <!-- Author / brand -->
  <text x="80" y="475" font-family="Inter, system-ui, sans-serif"
        font-size="18" font-weight="600" fill="#E5E7EB">ANBIAS</text>
  <text x="80" y="500" font-family="Inter, system-ui, sans-serif"
        font-size="15" font-weight="400" fill="#6B7280">
    AI-Powered Web Development &amp; Security
  </text>

  <text x="1120" y="595" font-family="ui-monospace, monospace"
        font-size="14" font-weight="500" fill="#4B5563" text-anchor="end">
    anbias.com / blog
  </text>
</svg>
