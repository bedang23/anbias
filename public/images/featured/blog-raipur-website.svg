<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Why Every Business in Raipur Needs a Professional Website">
  <defs>
    <linearGradient id="bg-rwb" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1220"/>
      <stop offset="100%" stop-color="#1A1F3A"/>
    </linearGradient>
    <linearGradient id="acc-rwb" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#EC4899"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <radialGradient id="glow-rwb" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#EC4899" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#EC4899" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid-rwb" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#1F2937" stroke-width="1" opacity="0.6"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg-rwb)"/>
  <rect width="1200" height="630" fill="url(#grid-rwb)"/>

  <!-- glow -->
  <circle cx="940" cy="310" r="280" fill="url(#glow-rwb)"/>

  <!-- Browser window mockup on right -->
  <g transform="translate(720 160)">
    <!-- window frame -->
    <rect x="0" y="0" width="420" height="280" rx="14" fill="#111827" stroke="#374151" stroke-width="1.5"/>
    <!-- title bar -->
    <rect x="0" y="0" width="420" height="32" rx="14" fill="#1F2937"/>
    <rect x="0" y="18" width="420" height="14" fill="#1F2937"/>
    <circle cx="18" cy="16" r="5" fill="#EF4444"/>
    <circle cx="36" cy="16" r="5" fill="#F59E0B"/>
    <circle cx="54" cy="16" r="5" fill="#10B981"/>
    <!-- url bar -->
    <rect x="80" y="8" width="280" height="16" rx="8" fill="#0B1220" stroke="#374151" stroke-width="1"/>
    <text x="92" y="20" font-family="ui-monospace, monospace" font-size="10" fill="#9CA3AF">
      yourbusiness.com
    </text>

    <!-- nav -->
    <rect x="20" y="50" width="60" height="8" rx="4" fill="#EC4899"/>
    <rect x="92" y="50" width="48" height="6" rx="3" fill="#6B7280"/>
    <rect x="152" y="50" width="48" height="6" rx="3" fill="#6B7280"/>
    <rect x="212" y="50" width="48" height="6" rx="3" fill="#6B7280"/>

    <!-- hero text lines -->
    <rect x="20" y="90" width="280" height="14" rx="7" fill="#E5E7EB"/>
    <rect x="20" y="112" width="220" height="14" rx="7" fill="#E5E7EB"/>
    <rect x="20" y="138" width="180" height="8" rx="4" fill="#6B7280"/>
    <rect x="20" y="154" width="220" height="8" rx="4" fill="#6B7280"/>

    <!-- CTA button -->
    <rect x="20" y="180" width="120" height="38" rx="8" fill="url(#acc-rwb)"/>
    <text x="80" y="204" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">
      Get Started
    </text>

    <!-- right side card -->
    <rect x="280" y="80" width="120" height="170" rx="10" fill="#0F172A" stroke="#374151" stroke-width="1"/>
    <rect x="292" y="92" width="96" height="60" rx="6" fill="#1F2937"/>
    <circle cx="340" cy="122" r="14" fill="none" stroke="#EC4899" stroke-width="2"/>
    <path d="M 333 122 L 339 128 L 348 116" fill="none" stroke="#EC4899" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="292" y="164" width="80" height="6" rx="3" fill="#9CA3AF"/>
    <rect x="292" y="178" width="60" height="5" rx="2.5" fill="#4B5563"/>
    <rect x="292" y="206" width="96" height="32" rx="6" fill="#1F2937" stroke="#374151"/>
    <text x="340" y="226" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#EC4899" text-anchor="middle">Book →</text>
  </g>

  <!-- Eyebrow -->
  <text x="80" y="120" font-family="Inter, system-ui, sans-serif"
        font-size="18" font-weight="600" fill="#EC4899" letter-spacing="4">
    LOCAL BUSINESS GROWTH
  </text>

  <!-- Headline -->
  <text x="80" y="200" font-family="Inter, system-ui, sans-serif"
        font-size="62" font-weight="800" fill="#FFFFFF" letter-spacing="-1.5">
    Why every Raipur
  </text>
  <text x="80" y="270" font-family="Inter, system-ui, sans-serif"
        font-size="62" font-weight="800" fill="#FFFFFF" letter-spacing="-1.5">
    business needs
  </text>
  <text x="80" y="340" font-family="Inter, system-ui, sans-serif"
        font-size="62" font-weight="800" fill="url(#acc-rwb)" letter-spacing="-1.5">
    a real website.
  </text>

  <!-- Sub-headline -->
  <text x="80" y="395" font-family="Inter, system-ui, sans-serif"
        font-size="22" font-weight="400" fill="#9CA3AF">
    Without one, you are invisible to 750M Indians online.
  </text>

  <!-- divider -->
  <rect x="80" y="430" width="64" height="3" fill="url(#acc-rwb)"/>

  <!-- Author / brand -->
  <text x="80" y="475" font-family="Inter, system-ui, sans-serif"
        font-size="18" font-weight="600" fill="#E5E7EB">ANBIAS</text>
  <text x="80" y="500" font-family="Inter, system-ui, sans-serif"
        font-size="15" font-weight="400" fill="#6B7280">
    AI-Powered Web Development &amp; Security
  </text>

  <text x="1120" y="595" font-family="ui-monospace, monospace"
        font-size="14" font-weight="500" fill="#4B5563" text-anchor="end">
    anbias.com / blog
  </text>
</svg>
